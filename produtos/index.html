<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Produtos | Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topo">
    <div class="container nav-wrap">
      <h1 class="logo">Sistema de Produtos</h1>
      <nav class="menu">
        <a href="/" class="menu-link">Home</a>
        <a href="/produtos" class="menu-link active">Produtos</a>
      </nav>
    </div>
  </header>

  <main class="crud-main">
    <section class="crud-card container">
      <h2>Cadastro de Produtos</h2>
      <p class="crud-subtitle">Adicione ou edite seus produtos com persistência local.</p>

      <div class="form-grid">
        <div class="campo">
          <label for="nomeProduto">Nome do Produto</label>
          <input type="text" id="nomeProduto" placeholder="Ex: Notebook" />
        </div>

        <div class="campo">
          <label for="precoProduto">Preço (R$)</label>
          <input type="number" id="precoProduto" placeholder="Ex: 2999.90" step="0.01" min="0" />
        </div>
      </div>

      <button id="btnAdicionarSalvar" class="btn-principal">Adicionar</button>

      <div class="lista-header">
        <h3>Produtos cadastrados</h3>
        <span id="totalPrecos">Total: R$ 0,00</span>
      </div>

      <div id="listaProdutos" class="lista-produtos"></div>
    </section>
  </main>

  <footer class="rodape">
    <p>Projeto desenvolvido para aprendizado</p>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
